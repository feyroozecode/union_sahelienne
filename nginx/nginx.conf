events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 50m;
    sendfile on;
    keepalive_timeout 65;

    # HTTP — redirect to HTTPS
    server {
        listen 80;
        server_name api-unionsahel.alfajarsoft.com union-sahel.alfajarsoft.com alfajarsoft.com www.alfajarsoft.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API backend
    server {
        listen 443 ssl;
        http2 on;
        server_name api-unionsahel.alfajarsoft.com;

        ssl_certificate     /etc/letsencrypt/live/api-unionsahel.alfajarsoft.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-unionsahel.alfajarsoft.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://172.25.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Main website
    server {
        listen 443 ssl;
        http2 on;
        server_name alfajarsoft.com www.alfajarsoft.com;

        ssl_certificate     /etc/letsencrypt/live/alfajarsoft.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/alfajarsoft.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 1000;

        location / {
            proxy_pass http://172.25.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Admin frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name union-sahel.alfajarsoft.com;

        ssl_certificate     /etc/letsencrypt/live/api-unionsahel.alfajarsoft.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-unionsahel.alfajarsoft.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 1000;

        location / {
            proxy_pass http://admin:3022;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
